<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无界台球俱乐部</title>
</head>
<body>
    <button onclick="openShop()">打开抖音店铺</button>

    <script>
    function openShop() {
        const poi_id = "7556202622550542376";
        const shop_url = "https://v.douyin.com/yBKNtPDyXjE/";

        // 创建一个隐藏的iframe来尝试唤起
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = "snssdk1128://poi/detail?poi_id=" + poi_id;
        document.body.appendChild(iframe);

        // 超时后移除iframe并跳转短链接
        setTimeout(() => {
            document.body.removeChild(iframe);
            window.location.href = shop_url;
        }, 800);
    }
    </script>
</body>
</html>
