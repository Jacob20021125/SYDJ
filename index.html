<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>商家好评 · 好评宝）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        :root {
            --bg-color: #f5f7fa;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-primary: #1e2a3a;
            --text-secondary: #2c3e50;
            --border-light: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.08);
            --btn-bg: rgba(255, 255, 255, 0.7);
            --btn-hover: rgba(255, 255, 255, 0.9);
            --warning-bg: rgba(255, 230, 200, 0.7);
            --wechat-green: #07c160;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: rgba(40, 40, 40, 0.7);
                --text-primary: #f0f0f0;
                --text-secondary: #cccccc;
                --border-light: rgba(255, 255, 255, 0.1);
                --shadow-color: rgba(0, 0, 0, 0.5);
                --btn-bg: rgba(60, 60, 60, 0.7);
                --btn-hover: rgba(80, 80, 80, 0.9);
                --warning-bg: rgba(80, 60, 30, 0.7);
                --wechat-green: #06ad54;
            }
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
        }

        .glass-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-radius: 36px 36px 28px 28px;
            padding: 24px 20px 20px;
            box-shadow: 0 20px 40px var(--shadow-color), 0 0 0 1px var(--border-light) inset;
            border: 1px solid var(--border-light);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .review-card {
            background: var(--btn-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 18px 16px 22px;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 16px var(--shadow-color);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            animation: cardPop 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }

        .review-card:active {
            transform: scale(0.98);
        }

        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .review-text {
            font-size: 1.05rem;
            line-height: 1.4;
            color: var(--text-primary);
            font-weight: 480;
            word-break: break-word;
            flex: 1;
            padding-right: 12px;
        }

        .copy-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 550;
            color: var(--text-secondary);
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 8px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .copy-btn:active {
            transform: scale(0.92);
            background: var(--btn-hover);
        }

        .copy-btn::after {
            content: "📋";
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .browser-tip {
            background: var(--warning-bg);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 10px 0 16px;
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 10px var(--shadow-color);
        }

        .contact-footer {
            margin-top: 16px;
            text-align: center;
            padding: 18px 10px 10px;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
            border-radius: 0 0 24px 24px;
        }

        .contact-email {
            background: var(--btn-bg);
            display: inline-block;
            padding: 8px 28px;
            border-radius: 50px;
            border: 1px solid var(--border-light);
            margin-top: 8px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            box-shadow: 0 2px 6px var(--shadow-color);
            text-decoration: none;
        }

        /* 通用模态框（用于选择APP） */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-glass {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 48px;
            padding: 32px 24px;
            width: 300px;
            border: 1px solid var(--border-light);
            box-shadow: 0 30px 60px var(--shadow-color);
            transform: scale(0.9);
            transition: transform 0.2s;
            text-align: center;
        }

        .modal-overlay.show .modal-glass {
            transform: scale(1);
        }

        .modal-title {
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 580;
            margin-bottom: 20px;
        }

        .app-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }

        .app-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 16px 10px;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-primary);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 12px var(--shadow-color);
        }

        .app-btn:active {
            transform: scale(0.96);
            background: var(--btn-hover);
        }

        .app-btn.douyin {
            border-left: 8px solid #ff5777;
        }
        .app-btn.meituan {
            border-left: 8px solid #ffc107;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 12px;
            margin-top: 8px;
            font-size: 1rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.1s;
        }
        .cancel-btn:active {
            background: var(--btn-bg);
        }

        .empty-message {
            text-align: center;
            padding: 30px 0;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 1.2rem;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            z-index: 2000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            text-align: center;
            max-width: 80%;
        }

        /* ========== 精美微信引导弹窗 ========== */
        .wechat-guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .wechat-guide-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .wechat-guide-card {
            background: var(--card-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 48px;
            padding: 36px 28px;
            max-width: 380px;
            width: 85%;
            border: 2px solid var(--wechat-green);
            box-shadow: 0 30px 60px var(--shadow-color), 0 0 0 2px rgba(7, 193, 96, 0.3);
            text-align: center;
            color: var(--text-primary);
            position: relative;
            animation: guidePop 0.4s cubic-bezier(0.21, 1.11, 0.35, 1.1);
        }

        @keyframes guidePop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .close-guide {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.1s;
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        .close-guide:active {
            transform: scale(0.9);
            background: var(--btn-hover);
        }

        .guide-icon {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.2));
            animation: arrowBounce 1.2s infinite alternate ease-in-out;
        }

        @keyframes arrowBounce {
            from { transform: translateY(0) rotate(25deg); }
            to { transform: translateY(-20px) rotate(25deg); }
        }

        .guide-dots {
            font-size: 60px;
            letter-spacing: 12px;
            color: var(--wechat-green);
            margin: 0 0 15px;
            text-shadow: 0 4px 8px var(--shadow-color);
        }

        .guide-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--wechat-green);
            margin-bottom: 16px;
            text-shadow: 0 2px 4px var(--shadow-color);
        }

        .guide-text {
            font-size: 1.3rem;
            font-weight: 600;
            background: rgba(7, 193, 96, 0.15);
            padding: 14px 0;
            border-radius: 60px;
            margin: 20px 0 12px;
            border: 1px solid rgba(7, 193, 96, 0.3);
        }

        .guide-sub {
            font-size: 1.1rem;
            margin-bottom: 28px;
            opacity: 0.9;
        }

        .guide-btn {
            background: var(--wechat-green);
            border: none;
            border-radius: 60px;
            padding: 16px 30px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            width: 100%;
            box-shadow: 0 12px 24px rgba(7, 193, 96, 0.4);
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .guide-btn:active {
            transform: scale(0.96);
            background: #06ad54;
        }
    </style>
</head>

                "整体体验超棒，环境干净卫生，设备流畅不卡，服务贴心，以后会常来打卡。"

            const INIT_REVIEWS = REVIEW_TEXTS.map((text, index) => ({ id: `r${index + 1}`, text }));
            let currentReviews = INIT_REVIEWS.map(item => ({ ...item }));
            let selectedReviewId = null;

            // 环境检测
            const ua = navigator.userAgent.toLowerCase();
            const isWeChat = ua.indexOf('micromessenger') !== -1;
            const isIOS = /iphone|ipad|ipod/.test(ua);
            const isAndroid = /android/.test(ua);
            const isHarmony = ua.indexOf('harmony') !== -1;

            // DOM 元素
            const reviewsContainer = document.getElementById('reviewsContainer');
            const modalOverlay = document.getElementById('appChoiceModal');
            const closeModalBtn = document.getElementById('closeModal');
            const chooseDouyin = document.getElementById('chooseDouyin');
            const chooseMeituan = document.getElementById('chooseMeituan');
            const browserTip = document.getElementById('browserTip');
            const toastMessage = document.getElementById('toastMessage');

            // 微信引导弹窗元素
            const guideOverlay = document.getElementById('wechatGuideOverlay');
            const closeGuideBtn = document.getElementById('closeGuideBtn');
            const guideConfirmBtn = document.getElementById('guideConfirmBtn');

            // 显示/隐藏引导弹窗
            function showGuide() {
                if (guideOverlay) guideOverlay.classList.add('show');
            }
            function hideGuide() {
                if (guideOverlay) guideOverlay.classList.remove('show');
            }

            // 显示Toast提示
            function showToast(msg, duration = 3000) {
                toastMessage.style.display = 'block';
                toastMessage.textContent = msg;
                setTimeout(() => {
                    toastMessage.style.display = 'none';
                }, duration);
            }

            // ========== 微信环境专属逻辑 ==========
            if (isWeChat) {
                // 隐藏普通提示条
                browserTip.style.display = 'none';

                // 页面加载后立即显示引导弹窗（延迟一小段时间确保DOM渲染）
                setTimeout(() => {
                    showGuide();
                }, 300);

                // 阻止任何交互元素的默认行为，并弹出引导
                document.addEventListener('click', function(e) {
                    // 如果点击的是引导弹窗内部元素或关闭按钮，不阻止
                    if (e.target.closest('.wechat-guide-card') || e.target === closeGuideBtn || e.target === guideConfirmBtn) {
                        return;
                    }
                    // 如果点击的是引导弹窗遮罩，关闭弹窗
                    if (e.target.classList.contains('wechat-guide-overlay')) {
                        hideGuide();
                        return;
                    }
                    // 其他任何点击（复制按钮、APP选择、电话等）都显示引导并阻止默认

                        e.preventDefault();
                        showGuide();
                    }
                }, true);

                // 关闭引导弹窗的事件
                closeGuideBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    hideGuide();
                });
                guideConfirmBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    hideGuide();
                });
                guideOverlay.addEventListener('click', (e) => {
                    if (e.target === guideOverlay) hideGuide();
                });
            } else {
                // 非微信环境，隐藏引导弹窗，显示普通提示条
                browserTip.style.display = 'block';
            }

            // 随机挑选5条
            function pickRandomFive(arr) {
                if (arr.length <= 5) return arr.slice();
                const shuffled = [...arr];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled.slice(0, 5);
            }

            // 渲染好评卡片
            function renderReviews() {
                const listToShow = pickRandomFive(currentReviews);
                if (listToShow.length === 0) {
                    reviewsContainer.innerHTML = '<div class="empty-message">✨ 暂时没有好评了，刷新页面恢复~</div>';
                    return;
                }
                let htmlStr = '';
                listToShow.forEach(item => {
                    htmlStr += `
                        <div class="review-card">
                            <span class="review-text">${item.text}</span>
                            <button class="copy-btn" data-id="${item.id}">复制</button>
                        </div>
                    `;
                });
                reviewsContainer.innerHTML = htmlStr;
            }

            // 库存提醒
            function checkStockAndAlert() {
                const len = currentReviews.length;
                if (len === 20) showToast('📢 库存剩余 20 条');
                else if (len === 10) showToast('📢 库存剩余 10 条');
                else if (len === 5) showToast('📢 库存只剩 5 条啦！');
            }

            // 删除好评
            function deleteReviewById(id) {
                const beforeLength = currentReviews.length;
                currentReviews = currentReviews.filter(item => item.id !== id);
                if (beforeLength !== currentReviews.length) {
                    renderReviews();
                    checkStockAndAlert();
                    return true;
                }
                return false;
            }

            // ========== 美团多级唤醒（优化直达商家页） ==========
            function jumpToMeituan() {
                const config = SHOP_CONFIG.meituan;
                const selectedReview = currentReviews.find(item => item.id === selectedReviewId);
                if (selectedReview) {
                    navigator.clipboard.writeText(selectedReview.text).catch(() => {});
                }

                let appLaunched = false;

                const visibilityHandler = function() {
                    if (document.hidden) {
                        appLaunched = true;
                        cleanUp();
                        showToast('✅ 美团APP已打开', 2000);
                    }
                };
                const blurHandler = function() {
                    appLaunched = true;
                    cleanUp();
                    showToast('✅ 美团APP已打开', 2000);
                };
                function cleanUp() {
                    document.removeEventListener('visibilitychange', visibilityHandler);
                    window.removeEventListener('blur', blurHandler);
                    if (window._appJumpTimer) clearTimeout(window._appJumpTimer);
                }

                document.addEventListener('visibilitychange', visibilityHandler);
                window.addEventListener('blur', blurHandler);

                // 按优先级尝试不同的唤起方式
                const schemes = [
                    { type: 'universal', url: config.universalLink },
                    { type: 'scheme', url: config.schemePath },
                    { type: 'scheme', url: config.schemeShop },
                    { type: 'scheme', url: config.schemeParam }
                ];

                function tryNext(index) {
                    if (appLaunched || index >= schemes.length) return;
                    const item = schemes[index];
                    if (item.type === 'universal') {
                        const link = document.createElement('a');
                        link.href = item.url;
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        link.click();
                        setTimeout(() => document.body.removeChild(link), 100);
                    } else {
                        if (isAndroid || isHarmony) {
                            const iframe = document.createElement('iframe');
                            iframe.style.display = 'none';
                            iframe.src = item.url;
                            document.body.appendChild(iframe);
                            setTimeout(() => document.body.removeChild(iframe), 100);
                        } else {
                            window.location.href = item.url;
                        }
                    }
                    setTimeout(() => tryNext(index + 1), 300);
                }

                tryNext(0);

                window._appJumpTimer = setTimeout(() => {
                    if (!appLaunched) {
                        cleanUp();
                        if (confirm('未成功唤起美团APP，是否前往网页版查看？')) {
                            window.location.href = config.fallbackUrl;
                        }
                    }
                }, 3000);
            }

            // 抖音唤起
            function jumpToDouyin() {
                const config = SHOP_CONFIG.douyin;
                const selectedReview = currentReviews.find(item => item.id === selectedReviewId);
                if (selectedReview) {
                    navigator.clipboard.writeText(selectedReview.text).catch(() => {});
                }

                let appLaunched = false;

                const visibilityHandler = function() {
                    if (document.hidden) {
                        appLaunched = true;
                        document.removeEventListener('visibilitychange', visibilityHandler);
                        window.removeEventListener('blur', blurHandler);
                        if (window._appJumpTimer) clearTimeout(window._appJumpTimer);
                        showToast('✅ 抖音APP已打开', 2000);
                    }
                };
                const blurHandler = function() {
                    appLaunched = true;
                    document.removeEventListener('visibilitychange', visibilityHandler);
                    window.removeEventListener('blur', blurHandler);
                    if (window._appJumpTimer) clearTimeout(window._appJumpTimer);
                    showToast('✅ 抖音APP已打开', 2000);
                };

                document.addEventListener('visibilitychange', visibilityHandler);
                window.addEventListener('blur', blurHandler);

                // Universal Link
                const link = document.createElement('a');
                link.href = config.universalLink;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                setTimeout(() => document.body.removeChild(link), 100);

                // 延迟尝试 Scheme
                setTimeout(() => {
                    if (!appLaunched) {
                        if (isAndroid || isHarmony) {
                            const iframe = document.createElement('iframe');
                            iframe.style.display = 'none';
                            iframe.src = config.scheme;
                            document.body.appendChild(iframe);
                            setTimeout(() => document.body.removeChild(iframe), 100);
                        } else {
                            window.location.href = config.scheme;
                        }
                    }
                }, 300);

                window._appJumpTimer = setTimeout(() => {
                    if (!appLaunched) {
                        document.removeEventListener('visibilitychange', visibilityHandler);
                        window.removeEventListener('blur', blurHandler);
                        if (confirm('未成功唤起抖音APP，是否前往网页版查看？')) {
                            window.location.href = config.fallbackUrl;
                        }
                    }
                }, 3000);
            }

            // 模态框控制
            function hideModal() {
                modalOverlay.classList.remove('show');
                selectedReviewId = null;
            }
            function showModal(id) {
                selectedReviewId = id;
                modalOverlay.classList.add('show');
            }

            // 非微信环境才绑定唤起事件
            if (!isWeChat) {
                reviewsContainer.addEventListener('click', (e) => {
                    const copyBtn = e.target.closest('.copy-btn');
                    if (!copyBtn) return;
                    const id = copyBtn.getAttribute('data-id');
                    if (id) showModal(id);
                });

                chooseDouyin.addEventListener('click', () => {
                    if (!selectedReviewId) { hideModal(); return; }
                    deleteReviewById(selectedReviewId);
                    hideModal();
                    jumpToDouyin();
                });

                chooseMeituan.addEventListener('click', () => {
                    if (!selectedReviewId) { hideModal(); return; }
                    deleteReviewById(selectedReviewId);
                    hideModal();
                    jumpToMeituan();
                });

                closeModalBtn.addEventListener('click', hideModal);
                modalOverlay.addEventListener('click', (e) => {
                    if (e.target === modalOverlay) hideModal();
                });
            }

            // 初始化
            function initPage() {
                currentReviews = INIT_REVIEWS.map(item => ({ ...item }));
                renderReviews();
            }
            initPage();
        })();
    </script>
</body>
</html>
