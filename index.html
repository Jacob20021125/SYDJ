<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>商家好评 · 双轨唤醒（微信提示+多系统兼容）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        :root {
            --bg-color: #f5f7fa;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-primary: #1e2a3a;
            --text-secondary: #2c3e50;
            --border-light: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.08);
            --btn-bg: rgba(255, 255, 255, 0.7);
            --btn-hover: rgba(255, 255, 255, 0.9);
            --warning-bg: rgba(255, 230, 200, 0.7);
            --wechat-bg: rgba(26, 173, 25, 0.1);
            --wechat-border: rgba(26, 173, 25, 0.3);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: rgba(40, 40, 40, 0.7);
                --text-primary: #f0f0f0;
                --text-secondary: #cccccc;
                --border-light: rgba(255, 255, 255, 0.1);
                --shadow-color: rgba(0, 0, 0, 0.5);
                --btn-bg: rgba(60, 60, 60, 0.7);
                --btn-hover: rgba(80, 80, 80, 0.9);
                --warning-bg: rgba(80, 60, 30, 0.7);
                --wechat-bg: rgba(26, 173, 25, 0.2);
                --wechat-border: rgba(26, 173, 25, 0.4);
            }
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
        }

        .glass-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-radius: 36px 36px 28px 28px;
            padding: 24px 20px 20px;
            box-shadow: 0 20px 40px var(--shadow-color), 0 0 0 1px var(--border-light) inset;
            border: 1px solid var(--border-light);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .review-card {
            background: var(--btn-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 18px 16px 22px;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 16px var(--shadow-color);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            animation: cardPop 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }

        .review-card:active {
            transform: scale(0.98);
        }

        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .review-text {
            font-size: 1.05rem;
            line-height: 1.4;
            color: var(--text-primary);
            font-weight: 480;
            word-break: break-word;
            flex: 1;
            padding-right: 12px;
        }

        .copy-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 550;
            color: var(--text-secondary);
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 8px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .copy-btn:active {
            transform: scale(0.92);
            background: var(--btn-hover);
        }

        .copy-btn::after {
            content: "📋";
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .browser-tip {
            background: var(--warning-bg);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 10px 0 16px;
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 10px var(--shadow-color);
        }

        .wechat-modal {
            background: var(--wechat-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px 20px;
            margin: 10px 0 16px;
            border: 2px solid var(--wechat-border);
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            box-shadow: 0 8px 20px var(--shadow-color);
        }

        .wechat-modal::before {
            content: "⚠️";
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .contact-footer {
            margin-top: 16px;
            text-align: center;
            padding: 18px 10px 10px;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
            border-radius: 0 0 24px 24px;
        }

        .contact-email {
            background: var(--btn-bg);
            display: inline-block;
            padding: 8px 28px;
            border-radius: 50px;
            border: 1px solid var(--border-light);
            margin-top: 8px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            box-shadow: 0 2px 6px var(--shadow-color);
            text-decoration: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-glass {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 48px;
            padding: 32px 24px;
            width: 300px;
            border: 1px solid var(--border-light);
            box-shadow: 0 30px 60px var(--shadow-color);
            transform: scale(0.9);
            transition: transform 0.2s;
            text-align: center;
        }

        .modal-overlay.show .modal-glass {
            transform: scale(1);
        }

        .modal-title {
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 580;
            margin-bottom: 20px;
        }

        .app-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }

        .app-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 16px 10px;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-primary);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 12px var(--shadow-color);
        }

        .app-btn:active {
            transform: scale(0.96);
            background: var(--btn-hover);
        }

        .app-btn.douyin {
            border-left: 8px solid #ff5777;
        }
        .app-btn.meituan {
            border-left: 8px solid #ffc107;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 12px;
            margin-top: 8px;
            font-size: 1rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.1s;
        }
        .cancel-btn:active {
            background: var(--btn-bg);
        }

        .empty-message {
            text-align: center;
            padding: 30px 0;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<script>

            },

                universalLink: "https://www.douyin.com/aweme/poi/7613748240831546163",
                // 抖音URL Scheme [citation:8]

        };

        // 好评话库
        const REVIEW_TEXTS = [
            "环境干净整洁，空气流通不闷，电脑配置高游戏流畅不卡顿，键鼠手感好，整体上网体验超棒。",

            "网咖环境高级又安静，卫生做得很到位，设备新反应快，和朋友开黑打游戏特别顺畅，性价比很高。",
            "电脑配置很高，吃鸡、LOL 运行流畅，没有延迟也不卡顿，耳机音效好，整体体验非常满意。",

            "位置好找，店内整洁宽敞，设备维护得很好，游戏更新及时，网速一直很稳定，强烈推荐。",
            "座椅超级舒服，久坐腰颈都不累，电脑反应迅速，多开程序也不卡，是休闲放松的好去处。",
            "环境清新无烟味，卫生干净，外设手感一流，玩游戏沉浸感很强，服务热情又周到。",
            "网咖装修时尚，氛围超棒，电脑配置高端，画面流畅，价格实惠，性价比真的绝了。",
            "网速稳定不掉线，设备崭新好用，空间宽敞不拥挤，店员服务及时，体验感直接满分。",
            "环境安静适合开黑，电脑性能强劲，游戏加载超快，耳机清晰，整体上网非常舒适。",
            "卫生条件一流，桌面干净整洁，电脑不卡顿，外设好用，服务态度好，值得经常来。",
            "店内环境舒适，空调温度适中，机器配置高，游戏体验极佳，朋友聚会开黑首选这里。",
            "设备很新，操作流畅，屏幕高清不伤眼，网速飞快，环境安静，上网很放松。",
            "网咖服务贴心，环境雅致，电脑运行稳定，玩游戏毫无压力，性价比超高。",
            "空间大不压抑，空气清新，键鼠手感舒适，游戏多更新快，店员热情有礼貌。",
            "网速给力不延迟，电脑配置高，画质清晰，环境干净安静，上网体验超预期。",
            "环境简约大气，卫生做得好，设备反应快，玩大型游戏超顺畅，真心强烈推荐。",
            "座椅舒适包裹性好，久坐不疲劳，电脑性能强，网速快，服务到位很满意。",
            "店内氛围好，适合娱乐放松，机器干净好用，游戏流畅，价格合理，值得再来。",
            "环境整洁无烟味，设备维护好，电脑不卡顿，网速稳定，服务态度超棒。",
            "网咖配置在线，玩 3A 大作毫无压力，屏幕清晰，音效好，体验感直接拉满。",
            "位置便利，环境舒适安静，电脑速度快，游戏齐全，服务贴心，性价比很高。",
            "卫生干净整洁，设备崭新，操作流畅，网速超快，环境好，上网很舒服。",
            "店内灯光柔和，环境安静不吵，电脑性能强，外设好用，服务及时又周到。",
            "高端配置，流畅运行各种游戏，无卡顿无延迟，环境舒适，是电竞爱好者的福音。",
            "网咖环境好，空气流通，电脑反应快，座椅舒服，服务热情，体验非常不错。",
            "设备齐全且崭新，网速稳定，游戏加载快，环境干净安静，上网很享受。",
            "空间宽敞，环境雅致，电脑配置高，玩游戏超爽，服务好，价格实惠。",
            "整体体验超棒，环境干净卫生，设备流畅不卡，服务贴心，以后会常来打卡。"
        ];

        // 初始化好评列表
        const INIT_REVIEWS = REVIEW_TEXTS.map((text, index) => ({
            id: `r${index + 1}`,
            text: text
        }));
        let currentReviews = INIT_REVIEWS.map(item => ({ ...item }));
        let selectedReviewId = null;

        // 检测微信浏览器
        const ua = navigator.userAgent.toLowerCase();
        const isWeChat = ua.indexOf('micromessenger') !== -1;
        const isIOS = /iphone|ipad|ipod/.test(ua);
        const isAndroid = /android/.test(ua);
        const isHarmony = ua.indexOf('harmony') !== -1; // 鸿蒙检测

        // DOM 元素
        const reviewsContainer = document.getElementById('reviewsContainer');
        const modalOverlay = document.getElementById('appChoiceModal');
        const closeModalBtn = document.getElementById('closeModal');
        const chooseDouyin = document.getElementById('chooseDouyin');
        const chooseMeituan = document.getElementById('chooseMeituan');
        const browserTip = document.getElementById('browserTip');
        const wechatModal = document.getElementById('wechatModal');
        const mainContainer = document.getElementById('mainContainer');

        // 微信环境特殊处理
        if (isWeChat) {
            // 显示微信专用提示，隐藏普通提示
            wechatModal.style.display = 'block';
            browserTip.style.display = 'none';
            
            // 微信内点击任何唤起按钮都弹窗提示用浏览器打开
            // 通过事件代理处理
            document.addEventListener('click', function(e) {
                if (e.target.closest('.app-btn') || e.target.closest('.copy-btn')) {
                    e.preventDefault();
                    alert('⚠️ 微信内无法直接唤起APP\n\n请点击右上角「...」选择「浏览器打开」\n在浏览器中即可自动唤起美团/抖音');
                }
            }, true); // 使用捕获阶段确保优先处理
        } else {
            // 非微信环境，正常显示
            wechatModal.style.display = 'none';
            browserTip.style.display = 'block';
        }

        // 随机挑选5条
        function pickRandomFive(arr) {
            if (arr.length <= 5) return arr.slice();
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, 5);
        }

        // 渲染好评卡片
        function renderReviews() {
            const listToShow = pickRandomFive(currentReviews);
            if (listToShow.length === 0) {
                reviewsContainer.innerHTML = `<div class="empty-message">✨ 暂时没有好评了，刷新页面恢复~</div>`;
                return;
            }
            let htmlStr = '';
            listToShow.forEach(item => {
                htmlStr += `
                    <div class="review-card">
                        <span class="review-text">${item.text}</span>
                        <button class="copy-btn" data-id="${item.id}">复制</button>
                    </div>
                `;
            });
            reviewsContainer.innerHTML = htmlStr;
        }

        // 检查剩余库存
        function checkStockAndAlert() {
            const len = currentReviews.length;
            if (len === 20) alert('📢 库存剩余 20 条');
            else if (len === 10) alert('📢 库存剩余 10 条');
            else if (len === 5) alert('📢 库存只剩 5 条啦！');
        }

        // 删除指定ID的好评
        function deleteReviewById(id) {
            const beforeLength = currentReviews.length;
            currentReviews = currentReviews.filter(item => item.id !== id);
            if (beforeLength !== currentReviews.length) {
                renderReviews();
                checkStockAndAlert();
                return true;
            }
            return false;
        }

        // ========== 核心唤起函数：双轨唤醒策略 ==========
        function jumpToApp(appType) {
            const config = SHOP_CONFIG[appType];
            if (!config) return;

            // 微信内已经阻止，这里只处理非微信环境
            if (isWeChat) return;

            // 复制好评文案
            const selectedReview = currentReviews.find(item => item.id === selectedReviewId);
            if (selectedReview) {
                navigator.clipboard.writeText(selectedReview.text).catch(() => {});
            }

            // 标记是否成功唤起（通过页面可见性推测）
            let appLaunched = false;

            // 监听页面隐藏（APP唤起成功时页面会进入后台）[citation:5]
            const visibilityHandler = function() {
                if (document.hidden) {
                    appLaunched = true;
                    // 清理监听和定时器
                    document.removeEventListener('visibilitychange', visibilityHandler);
                    window.removeEventListener('blur', blurHandler);
                    if (window._appJumpTimer) {
                        clearTimeout(window._appJumpTimer);
                        window._appJumpTimer = null;
                    }
                }
            };

            const blurHandler = function() {
                appLaunched = true;
                document.removeEventListener('visibilitychange', visibilityHandler);
                window.removeEventListener('blur', blurHandler);
                if (window._appJumpTimer) {
                    clearTimeout(window._appJumpTimer);
                    window._appJumpTimer = null;
                }
            };

            document.addEventListener('visibilitychange', visibilityHandler);
            window.addEventListener('blur', blurHandler);

            // 双轨唤醒：先尝试 Universal Link，再尝试 Scheme
            // Universal Link 在 iOS 上效果最好，不会被拦截 [citation:2]
            // Scheme 在 Android/鸿蒙上作为兜底 [citation:7]
            
            // 创建隐藏的 iframe 或 a 标签来触发
            const triggerUniversalLink = () => {
                const link = document.createElement('a');
                link.href = config.universalLink;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                setTimeout(() => {
                    document.body.removeChild(link);
                }, 100);
            };

            const triggerScheme = () => {
                // Android 和鸿蒙使用 iframe 更稳定 [citation:5]
                if (isAndroid || isHarmony) {
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = config.scheme;
                    document.body.appendChild(iframe);
                    setTimeout(() => {
                        document.body.removeChild(iframe);
                    }, 100);
                } else {
                    // iOS 使用 location.href
                    window.location.href = config.scheme;
                }
            };

            // 先触发 Universal Link（iOS 最佳实践）
            triggerUniversalLink();

            // 延迟 300ms 后触发 Scheme（作为兜底，兼容 Android/鸿蒙）[citation:1]
            setTimeout(() => {
                if (!appLaunched) {
                    triggerScheme();
                }
            }, 300);

            // 兜底：2秒后如果还没有唤起成功，且用户未安装APP，则跳转网页（仅作为最后选择）
            window._appJumpTimer = setTimeout(() => {
                if (!appLaunched) {
                    // 清理监听
                    document.removeEventListener('visibilitychange', visibilityHandler);
                    window.removeEventListener('blur', blurHandler);
                    
                    // 询问用户是否跳转网页（避免自动跳转）
                    if (confirm('未检测到APP唤起，可能是您未安装美团/抖音。是否前往网页版查看？')) {
                        window.location.href = config.fallbackUrl;
                    }
                }
            }, 2000);
        }

        // 模态框控制
        function hideModal() {
            modalOverlay.classList.remove('show');
            selectedReviewId = null;
        }

        function showModal(id) {
            selectedReviewId = id;
            modalOverlay.classList.add('show');
        }

        // 事件绑定（非微信环境才绑定唤起事件）
        if (!isWeChat) {
            reviewsContainer.addEventListener('click', (e) => {
                const copyBtn = e.target.closest('.copy-btn');
                if (!copyBtn) return;
                const id = copyBtn.getAttribute('data-id');
                if (id) showModal(id);
            });

            chooseDouyin.addEventListener('click', () => {
                if (!selectedReviewId) {
                    hideModal();
                    return;
                }
                deleteReviewById(selectedReviewId);
                hideModal();
                jumpToApp('douyin');
            });

            chooseMeituan.addEventListener('click', () => {
                if (!selectedReviewId) {
                    hideModal();
                    return;
                }
                deleteReviewById(selectedReviewId);
                hideModal();
                jumpToApp('meituan');
            });

            closeModalBtn.addEventListener('click', hideModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) hideModal();
            });
        } else {
            // 微信环境：按钮点击已经被全局阻止，但需要保持模态框关闭功能
            closeModalBtn.addEventListener('click', hideModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) hideModal();
            });
        }

        // 初始化
        function initPage() {
            currentReviews = INIT_REVIEWS.map(item => ({ ...item }));
            renderReviews();
        }

        initPage();
    })();
</script>
</body>
</html>
