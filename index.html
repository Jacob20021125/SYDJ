<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>商家好评 · 好评宝</title>
    <!-- Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 腾讯云 Cloudbase SDK (使用官方最新版) -->
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        /* ====== 完整样式 ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        :root {
            --bg-color: #f5f7fa;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-primary: #1e2a3a;
            --text-secondary: #2c3e50;
            --border-light: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.08);
            --btn-bg: rgba(255, 255, 255, 0.7);
            --btn-hover: rgba(255, 255, 255, 0.9);
            --warning-bg: rgba(255, 230, 200, 0.7);
            --guide-bg: rgba(255, 255, 255, 0.7);
            --guide-border: rgba(0, 0, 0, 0.2);
            --guide-btn-bg: #2c3e50;
            --guide-btn-text: #ffffff;
            --error-bg: rgba(255, 100, 100, 0.2);
            --manual-copy-bg: rgba(0, 0, 0, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: rgba(40, 40, 40, 0.7);
                --text-primary: #f0f0f0;
                --text-secondary: #cccccc;
                --border-light: rgba(255, 255, 255, 0.1);
                --shadow-color: rgba(0, 0, 0, 0.5);
                --btn-bg: rgba(60, 60, 60, 0.7);
                --btn-hover: rgba(80, 80, 80, 0.9);
                --warning-bg: rgba(80, 60, 30, 0.7);
                --guide-bg: rgba(40, 40, 40, 0.8);
                --guide-border: rgba(255, 255, 255, 0.2);
                --guide-btn-bg: #cccccc;
                --guide-btn-text: #121212;
                --error-bg: rgba(180, 60, 60, 0.4);
                --manual-copy-bg: rgba(30, 30, 30, 0.95);
            }
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
        }

        .glass-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-radius: 36px 36px 28px 28px;
            padding: 24px 20px 20px;
            box-shadow: 0 20px 40px var(--shadow-color), 0 0 0 1px var(--border-light) inset;
            border: 1px solid var(--border-light);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
            min-height: 280px;
        }

        .review-card {
            background: var(--btn-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 18px 16px 22px;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 16px var(--shadow-color);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            animation: cardPop 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }

        .review-card:active {
            transform: scale(0.98);
        }

        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .review-text {
            font-size: 1.05rem;
            line-height: 1.4;
            color: var(--text-primary);
            font-weight: 480;
            word-break: break-word;
            flex: 1;
            padding-right: 12px;
        }

        .copy-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 550;
            color: var(--text-secondary);
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 8px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .copy-btn:active {
            transform: scale(0.92);
            background: var(--btn-hover);
        }

        .copy-btn::after {
            content: "📋";
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .browser-tip {
            background: var(--warning-bg);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 10px 0 16px;
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 10px var(--shadow-color);
        }

        .contact-footer {
            margin-top: 16px;
            text-align: center;
            padding: 18px 10px 10px;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
            border-radius: 0 0 24px 24px;
        }

        .contact-email {
            background: var(--btn-bg);
            display: inline-block;
            padding: 8px 28px;
            border-radius: 50px;
            border: 1px solid var(--border-light);
            margin-top: 8px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            box-shadow: 0 2px 6px var(--shadow-color);
            text-decoration: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-glass {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 48px;
            padding: 32px 24px;
            width: 300px;
            border: 1px solid var(--border-light);
            box-shadow: 0 30px 60px var(--shadow-color);
            transform: scale(0.9);
            transition: transform 0.2s;
            text-align: center;
        }

        .modal-overlay.show .modal-glass {
            transform: scale(1);
        }

        .modal-title {
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 580;
            margin-bottom: 20px;
        }

        .app-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }

        .app-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 16px 10px;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-primary);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 12px var(--shadow-color);
        }

        .app-btn:active {
            transform: scale(0.96);
            background: var(--btn-hover);
        }

        .app-btn i {
            font-size: 1.5rem;
            width: 1.5rem;
            text-align: center;
        }

        .app-btn .fa-tiktok {
            color: #000;
        }
        @media (prefers-color-scheme: dark) {
            .app-btn .fa-tiktok {
                color: #fff;
            }
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 12px;
            margin-top: 8px;
            font-size: 1rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.1s;
        }
        .cancel-btn:active {
            background: var(--btn-bg);
        }

        .empty-message {
            text-align: center;
            padding: 30px 0;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 1.2rem;
        }

        .error-message {
            text-align: center;
            padding: 20px;
            color: #ff6b6b;
            background: var(--error-bg);
            border-radius: 24px;
            margin: 20px 0;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-light);
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            z-index: 2000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            text-align: center;
            max-width: 80%;
        }

        /* 手动复制弹窗 */
        .manual-copy-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
            transition: opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }
        .manual-copy-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .manual-copy-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 24px;
            max-width: 320px;
            width: 85%;
            border: 1px solid var(--border-light);
            box-shadow: 0 20px 40px var(--shadow-color);
            text-align: center;
        }
        .manual-copy-text {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
            font-size: 1rem;
            color: var(--text-primary);
            word-break: break-word;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        .manual-copy-hint {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .manual-copy-btn {
            background: var(--guide-btn-bg);
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--guide-btn-text);
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid var(--border-light);
        }
        .manual-copy-btn:active {
            transform: scale(0.96);
        }

        .wechat-guide-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            transition: opacity 0.15s ease-out;
            opacity: 0;
            pointer-events: none;
        }

        .wechat-guide-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .wechat-guide-card {
            background: var(--guide-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 48px;
            padding: 36px 28px;
            max-width: 380px;
            width: 85%;
            border: 1px solid var(--guide-border);
            box-shadow: 0 30px 60px var(--shadow-color);
            text-align: center;
            color: var(--text-primary);
            animation: guidePop 0.3s cubic-bezier(0.21, 1.11, 0.35, 1.1);
        }

        @keyframes guidePop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .guide-icon {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 8px var(--shadow-color));
            animation: arrowBounce 1.2s infinite alternate ease-in-out;
        }

        @keyframes arrowBounce {
            from { transform: translateY(0) rotate(25deg); }
            to { transform: translateY(-15px) rotate(25deg); }
        }

        .guide-dots {
            font-size: 60px;
            letter-spacing: 12px;
            color: var(--text-secondary);
            margin: 0 0 15px;
            text-shadow: 0 4px 8px var(--shadow-color);
        }

        .guide-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px var(--shadow-color);
        }

        .guide-text {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--btn-bg);
            padding: 14px 0;
            border-radius: 60px;
            margin: 20px 0 12px;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .guide-sub {
            font-size: 1.1rem;
            margin-bottom: 28px;
            opacity: 0.9;
            color: var(--text-secondary);
        }

        .guide-btn {
            background: var(--guide-btn-bg);
            border: none;
            border-radius: 60px;
            padding: 16px 30px;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--guide-btn-text);
            width: 100%;
            box-shadow: 0 12px 24px var(--shadow-color);
            cursor: pointer;
            transition: transform 0.1s ease, background 0.1s;
            border: 1px solid var(--border-light);
        }

        .guide-btn:active {
            transform: scale(0.96);
            background: var(--btn-hover);
        }

        .loading-skeleton {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .skeleton-card {
            background: var(--btn-bg);
            border-radius: 28px;
            height: 80px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="toast-message" id="toastMessage"></div>

    <!-- 微信引导弹窗 -->
    <div class="wechat-guide-overlay" id="wechatGuideOverlay">
        <div class="wechat-guide-card">
            <div class="guide-icon">↗️</div>
            <div class="guide-dots">⋯</div>
            <div class="guide-title">微信内无法打开</div>
            <div class="guide-text">点击右上角「···」</div>
            <div class="guide-sub">选择「浏览器打开」即可正常跳转APP</div>
            <button class="guide-btn" id="guideConfirmBtn">我知道了</button>
        </div>
    </div>

    <!-- 手动复制弹窗 -->
    <div class="manual-copy-overlay" id="manualCopyOverlay">
        <div class="manual-copy-card">
            <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 8px;">📋 复制失败</div>
            <div class="manual-copy-hint">请长按下方文字手动复制</div>
            <div class="manual-copy-text" id="manualCopyText"></div>
            <button class="manual-copy-btn" id="manualCopyCloseBtn">关闭</button>
        </div>
    </div>

    <div class="glass-container">
        <div id="reviewsContainer" class="reviews-list">
            <div class="loading-skeleton" id="loadingSkeleton">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>
        <div class="browser-tip" id="browserTip">✨ 点击复制 → 选择APP → 自动跳转商家页面</div>
        <div class="contact-footer">
            <span>📬 商务合作 · 好评宝</span>
            <a href="tel:15617743996" class="contact-email">📞15617743996</a>
        </div>
    </div>

    <!-- 选择APP模态框 -->
    <div class="modal-overlay" id="appChoiceModal">
        <div class="modal-glass">
            <div class="modal-title">平台选择</div>
            <div class="app-options">
                <div class="app-btn" id="chooseDouyin">
                    <i class="fab fa-tiktok"></i> 抖音
                </div>
                <div class="app-btn" id="chooseMeituan">
                    <i class="fas fa-store"></i> 美团
                </div>
            </div>
            <div class="cancel-btn" id="closeModal">取消</div>
        </div>
    </div>

    <script>
        (function() {
            // ================= 腾讯云 Cloudbase 配置 =================
            const CLOUD_ENV = 'good-reviews-3g35hh0i28b88e1b';
            const DEFAULT_COLLECTION = 'CS1';
            const urlParams = new URLSearchParams(window.location.search);
            const COLLECTION_NAME = urlParams.get('collection') || DEFAULT_COLLECTION;
            
            console.log(`当前使用的集合: ${COLLECTION_NAME}`);

            const CACHE_KEY = `reviews_cache_${COLLECTION_NAME}`;
            const CACHE_EXPIRE = 5 * 60 * 1000;

            let currentReviews = [];
            let selectedReviewId = null;
            let db = null;
            let collection = null;
            let isCloudReady = false;
            let cloudInitError = null;

            const ua = navigator.userAgent.toLowerCase();
            const isWeChat = ua.indexOf('micromessenger') !== -1;
            const isIOS = /iphone|ipad|ipod/.test(ua);
            const isAndroid = /android/.test(ua);
            const isHarmony = ua.indexOf('harmony') !== -1;

            const reviewsContainer = document.getElementById('reviewsContainer');
            const loadingSkeleton = document.getElementById('loadingSkeleton');
            const modalOverlay = document.getElementById('appChoiceModal');
            const closeModalBtn = document.getElementById('closeModal');
            const chooseDouyin = document.getElementById('chooseDouyin');
            const chooseMeituan = document.getElementById('chooseMeituan');
            const browserTip = document.getElementById('browserTip');
            const toastMessage = document.getElementById('toastMessage');
            const guideOverlay = document.getElementById('wechatGuideOverlay');
            const guideConfirmBtn = document.getElementById('guideConfirmBtn');
            const manualCopyOverlay = document.getElementById('manualCopyOverlay');
            const manualCopyText = document.getElementById('manualCopyText');
            const manualCopyCloseBtn = document.getElementById('manualCopyCloseBtn');

            function showToast(msg, duration = 3000) {
                toastMessage.style.display = 'block';
                toastMessage.textContent = msg;
                setTimeout(() => {
                    toastMessage.style.display = 'none';
                }, duration);
            }

            function showGuide() { guideOverlay.classList.add('show'); }
            function hideGuide() { guideOverlay.classList.remove('show'); }

            function showManualCopy(text) {
                manualCopyText.textContent = text;
                manualCopyOverlay.classList.add('show');
            }
            function hideManualCopy() {
                manualCopyOverlay.classList.remove('show');
            }
            manualCopyCloseBtn.addEventListener('click', hideManualCopy);
            manualCopyOverlay.addEventListener('click', (e) => {
                if (e.target === manualCopyOverlay) hideManualCopy();
            });

            if (isWeChat) {
                browserTip.style.display = 'none';
                setTimeout(showGuide, 300);
                guideConfirmBtn.addEventListener('click', (e) => { e.stopPropagation(); hideGuide(); });
                guideOverlay.addEventListener('click', (e) => { if (e.target === guideOverlay) hideGuide(); });
                document.addEventListener('click', function(e) {
                    if (e.target.closest('.wechat-guide-card')) return;
                    if (e.target === guideOverlay) return;
                    if (e.target.closest('.copy-btn') || e.target.closest('.app-btn') || e.target.closest('.contact-email')) {
                        e.preventDefault();
                        showGuide();
                    }
                }, true);
            } else {
                browserTip.style.display = 'block';
            }

            function getCachedReviews() {
                try {
                    const cached = localStorage.getItem(CACHE_KEY);
                    if (!cached) return null;
                    const data = JSON.parse(cached);
                    if (Date.now() - data.timestamp > CACHE_EXPIRE) {
                        localStorage.removeItem(CACHE_KEY);
                        return null;
                    }
                    return data.reviews;
                } catch (e) {
                    return null;
                }
            }

            function setCachedReviews(reviews) {
                try {
                    const cacheData = { reviews, timestamp: Date.now() };
                    localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
                } catch (e) {}
            }

            function clearCache() {
                localStorage.removeItem(CACHE_KEY);
            }

            async function initCloud() {
                try {
                    const app = cloudbase.init({ env: CLOUD_ENV });
                    await app.auth().signInAnonymously();
                    db = app.database();
                    collection = db.collection(COLLECTION_NAME);
                    isCloudReady = true;
                    console.log(`✅ 云数据库初始化成功，集合: ${COLLECTION_NAME}`);
                } catch (err) {
                    console.error('❌ 云数据库初始化失败', err);
                    cloudInitError = err.message || '请检查环境ID或匿名登录是否开启';
                    isCloudReady = false;
                }
            }

            async function fetchAllReviews() {
                if (!isCloudReady) return [];
                try {
                    const res = await collection.get();
                    const docs = res.data || [];
                    return docs.map(doc => ({ id: doc._id, text: doc.text }));
                } catch (err) {
                    console.error('拉取数据失败', err);
                    showToast('数据拉取失败: ' + (err.message || ''), 3000);
                    return [];
                }
            }

            async function deleteReviewById(id) {
                if (!isCloudReady || !id) return false;
                try {
                    await collection.doc(id).remove();
                    clearCache();
                    return true;
                } catch (err) {
                    console.error('删除失败', err);
                    showToast('删除失败：' + (err.message || ''), 2000);
                    return false;
                }
            }

            // ================= 终极复制函数（五层保障）=================
            function copyTextToClipboard(text) {
                // 第一层：现代 Clipboard API
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        console.log('Clipboard API 复制成功');
                    }).catch(() => {
                        // 失败后尝试传统方法
                        fallbackCopy1(text);
                    });
                } else {
                    fallbackCopy1(text);
                }
            }

            function fallbackCopy1(text) {
                // 第二层：传统 textarea 方法
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                textarea.setSelectionRange(0, 99999);
                try {
                    const success = document.execCommand('copy');
                    if (success) {
                        console.log('传统复制成功');
                        document.body.removeChild(textarea);
                        return;
                    } else {
                        // 如果失败，尝试另一种方法
                        fallbackCopy2(text);
                    }
                } catch (err) {
                    console.error('传统复制失败', err);
                    fallbackCopy2(text);
                }
                document.body.removeChild(textarea);
            }

            function fallbackCopy2(text) {
                // 第三层：针对移动端输入法的特殊处理（使用 input 元素）
                const input = document.createElement('input');
                input.value = text;
                input.style.position = 'fixed';
                input.style.opacity = '0';
                document.body.appendChild(input);
                input.focus();
                input.select();
                input.setSelectionRange(0, 99999);
                try {
                    const success = document.execCommand('copy');
                    if (success) {
                        console.log('input复制成功');
                        document.body.removeChild(input);
                        return;
                    } else {
                        fallbackCopy3(text);
                    }
                } catch (err) {
                    fallbackCopy3(text);
                }
                document.body.removeChild(input);
            }

            function fallbackCopy3(text) {
                // 第四层：显示手动复制弹窗
                showManualCopy(text);
                // 同时提示用户
                showToast('⚠️ 自动复制失败，请长按文案手动复制', 4000);
            }

            function renderReviewsFromData(reviews) {
                if (!reviews || reviews.length === 0) {
                    reviewsContainer.innerHTML = '<div class="empty-message">✨ 所有好评已被用完，请联系管理员重置~</div>';
                    return;
                }

                let listToShow;
                if (reviews.length <= 5) {
                    listToShow = reviews;
                } else {
                    const shuffled = [...reviews];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    listToShow = shuffled.slice(0, 5);
                }

                let htmlStr = '';
                listToShow.forEach(item => {
                    htmlStr += `
                        <div class="review-card">
                            <span class="review-text">${item.text}</span>
                            <button class="copy-btn" data-id="${item.id}">复制</button>
                        </div>
                    `;
                });
                reviewsContainer.innerHTML = htmlStr;

                const len = reviews.length;
                if (len === 20) showToast('📢 库存剩余 20 条');
                else if (len === 10) showToast('📢 库存剩余 10 条');
                else if (len === 5) showToast('📢 库存只剩 5 条啦！');
            }

            async function loadAndRender(useCache = true) {
                if (loadingSkeleton) loadingSkeleton.style.display = 'none';

                if (useCache) {
                    const cached = getCachedReviews();
                    if (cached) {
                        currentReviews = cached;
                        renderReviewsFromData(cached);
                        if (isCloudReady) {
                            fetchAllReviews().then(fresh => {
                                if (fresh && fresh.length > 0 && JSON.stringify(fresh) !== JSON.stringify(currentReviews)) {
                                    currentReviews = fresh;
                                    setCachedReviews(fresh);
                                    renderReviewsFromData(fresh);
                                }
                            }).catch(e => {});
                        }
                        return;
                    }
                }

                if (!isCloudReady) {
                    reviewsContainer.innerHTML = `<div class="error-message">❌ 数据库初始化失败：${cloudInitError || '未知错误'}<br>请检查：<br>1. 环境ID是否正确<br>2. 匿名登录是否开启<br>3. 集合 ${COLLECTION_NAME} 是否存在</div>`;
                    return;
                }

                const reviews = await fetchAllReviews();
                if (reviews.length === 0) {
                    reviewsContainer.innerHTML = '<div class="empty-message">✨ 暂无好评数据，请先在腾讯云添加</div>';
                } else {
                    currentReviews = reviews;
                    setCachedReviews(reviews);
                    renderReviewsFromData(reviews);
                }
            }

            function tryOpenApp(sequence, fallbackUrl, appName) {
                let appLaunched = false;
                const visibilityHandler = function() {
                    if (document.hidden) {
                        appLaunched = true;
                        cleanUp();
                        showToast(`✅ ${appName}APP已打开`, 2000);
                    }
                };
                const blurHandler = function() {
                    appLaunched = true;
                    cleanUp();
                    showToast(`✅ ${appName}APP已打开`, 2000);
                };
                function cleanUp() {
                    document.removeEventListener('visibilitychange', visibilityHandler);
                    window.removeEventListener('blur', blurHandler);
                    if (window._appJumpTimer) clearTimeout(window._appJumpTimer);
                }

                document.addEventListener('visibilitychange', visibilityHandler);
                window.addEventListener('blur', blurHandler);

                function tryNext(index) {
                    if (appLaunched || index >= sequence.length) return;
                    const item = sequence[index];
                    if (item.type === 'universal') {
                        const link = document.createElement('a');
                        link.href = item.url;
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        link.click();
                        setTimeout(() => document.body.removeChild(link), 100);
                    } else if (item.type === 'intent') {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = item.url;
                        document.body.appendChild(iframe);
                        setTimeout(() => document.body.removeChild(iframe), 100);
                    } else {
                        if (isAndroid || isHarmony) {
                            const iframe = document.createElement('iframe');
                            iframe.style.display = 'none';
                            iframe.src = item.url;
                            document.body.appendChild(iframe);
                            setTimeout(() => document.body.removeChild(iframe), 100);
                        } else {
                            window.location.href = item.url;
                        }
                    }
                    setTimeout(() => tryNext(index + 1), 400);
                }

                tryNext(0);
                window._appJumpTimer = setTimeout(() => {
                    if (!appLaunched) {
                        cleanUp();
                        if (confirm(`未成功唤起${appName}APP，是否前往网页版查看？`)) {
                            window.location.href = fallbackUrl;
                        }
                    }
                }, 3000);
            }

            function jumpToDouyin() {
                const config = SHOP_CONFIG.douyin;
                let sequence = [];
                if (isIOS) {
                    sequence = [
                        { type: 'universal', url: config.universalLink },
                        { type: 'scheme', url: config.scheme }
                    ];
                } else if (isAndroid || isHarmony) {
                    // 优先使用带 flags 的 intent
                    sequence = [
                        { type: 'intent', url: config.intent },
                        { type: 'universal', url: config.universalLink },
                        { type: 'scheme', url: config.scheme }
                    ];
                } else {
                    sequence = [{ type: 'scheme', url: config.scheme }];
                }
                tryOpenApp(sequence, config.fallbackUrl, '抖音');
            }

            function jumpToMeituan() {
                const config = SHOP_CONFIG.meituan;
                let sequence = [];
                if (isIOS) {
                    sequence = [
                        { type: 'universal', url: config.universalLink },
                        { type: 'scheme', url: config.schemePath },
                        { type: 'scheme', url: config.schemeShop },
                        { type: 'scheme', url: config.schemeParam },
                        { type: 'scheme', url: config.homeScheme }
                    ];
                } else if (isAndroid || isHarmony) {
                    sequence = [
                        { type: 'intent', url: config.intent },
                        { type: 'universal', url: config.universalLink },
                        { type: 'scheme', url: config.schemePath },
                        { type: 'scheme', url: config.schemeShop },
                        { type: 'scheme', url: config.schemeParam },
                        { type: 'scheme', url: config.homeScheme }
                    ];
                } else {
                    sequence = [
                        { type: 'scheme', url: config.schemePath },
                        { type: 'scheme', url: config.schemeShop },
                        { type: 'scheme', url: config.schemeParam },
                        { type: 'scheme', url: config.homeScheme }
                    ];
                }
                tryOpenApp(sequence, config.fallbackUrl, '美团');
            }

            // ================= 商家配置（抖音intent增加多个flags以提升兼容性）=================
            const SHOP_CONFIG = {
                meituan: {
                    name: "美团",
                    universalLink: "https://i.meituan.com/poi/1755904985",
                    intent: "intent://poi/1755904985#Intent;scheme=imeituan;package=com.sankuai.meituan;end;",
                    schemePath: "imeituan://www.meituan.com/poi/1755904985",
                    schemeShop: "imeituan://www.meituan.com/shop/1755904985",
                    schemeParam: "imeituan://www.meituan.com/poi?id=1755904985",
                    homeScheme: "imeituan://",
                    fallbackUrl: "http://dpurl.cn/rYQkSEfz"
                },
                douyin: {
                    name: "抖音",
                    universalLink: "https://www.douyin.com/",
                    // 组合 flags: 0x10000000 (NEW_TASK) + 0x20000000 (REORDER_TO_FRONT) + 0x04000000 (CLEAR_TOP)
                    intent: "intent://feed#Intent;package=com.ss.android.ugc.aweme;scheme=snssdk1128;launchFlags=0x34000000;end;",
                    scheme: "snssdk1128://",
                    fallbackUrl: "https://v.douyin.com/xVZOcGCPqIY/"
                }
            };

            function hideModal() {
                modalOverlay.classList.remove('show');
                selectedReviewId = null;
            }
            function showModal(id) {
                selectedReviewId = id;
                modalOverlay.classList.add('show');
            }

            if (!isWeChat) {
                reviewsContainer.addEventListener('click', (e) => {
                    const copyBtn = e.target.closest('.copy-btn');
                    if (!copyBtn) return;
                    const id = copyBtn.getAttribute('data-id');
                    if (id) showModal(id);
                });

                chooseDouyin.addEventListener('click', async () => {
                    if (!selectedReviewId) { hideModal(); return; }
                    const review = currentReviews.find(r => r.id === selectedReviewId);
                    if (review) {
                        copyTextToClipboard(review.text);
                    }
                    const deleteSuccess = await deleteReviewById(selectedReviewId);
                    if (!deleteSuccess) {
                        showToast('⚠️ 云删除失败，但文本已复制', 2000);
                    }
                    hideModal();
                    await loadAndRender(false);
                    jumpToDouyin();
                });

                chooseMeituan.addEventListener('click', async () => {
                    if (!selectedReviewId) { hideModal(); return; }
                    const review = currentReviews.find(r => r.id === selectedReviewId);
                    if (review) {
                        copyTextToClipboard(review.text);
                    }
                    const deleteSuccess = await deleteReviewById(selectedReviewId);
                    if (!deleteSuccess) {
                        showToast('⚠️ 云删除失败，但文本已复制', 2000);
                    }
                    hideModal();
                    await loadAndRender(false);
                    jumpToMeituan();
                });

                closeModalBtn.addEventListener('click', hideModal);
                modalOverlay.addEventListener('click', (e) => {
                    if (e.target === modalOverlay) hideModal();
                });
            }

            (async function bootstrap() {
                await loadAndRender(true);
                if (!isCloudReady) {
                    await initCloud();
                    if (isCloudReady) {
                        const currentContent = reviewsContainer.innerHTML;
                        if (currentContent.includes('错误') || currentContent.includes('暂无')) {
                            await loadAndRender(false);
                        }
                    } else {
                        if (loadingSkeleton) loadingSkeleton.style.display = 'none';
                        reviewsContainer.innerHTML = `<div class="error-message">❌ 数据库初始化失败：${cloudInitError || '未知错误'}<br>请检查：<br>1. 环境ID是否正确<br>2. 匿名登录是否开启<br>3. 集合 ${COLLECTION_NAME} 是否存在</div>`;
                    }
                }
            })();
        })();
    </script>
