<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <title>一键打开抖音店铺</title>
 </head>
 <body>
     <!-- 这里需要替换成你实际的门店ID（POI_ID） -->
     <a href=" ">点击一键打开无界台球俱乐部抖音店铺</a >
     <!-- 若用户未安装抖音，可引导跳转到浏览器打开短链接（可选） -->
     <script>
         // 先尝试用Schema唤起抖音
         const openDouyin = () => {
             const schemaUrl = 'snssdk1128://poi/detail?poi_id=你的门店ID';
             window.location.href = schemaUrl;
             // 若500ms内未唤起，跳转到短链接（这里的短链接需替换成你实际的）
             setTimeout(() => {
                 window.location.href = 'https://v.douyin.com/你的短链接';
             }, 500);
         };
     </script>
     <button onclick="openDouyin()">点击打开（若未唤起抖音则跳转到浏览器）</button>
 </body>
 </html>
